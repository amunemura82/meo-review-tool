<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEO レビュー返信自動生成ツール</title>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3a;
    --accent: #00d084;
    --accent2: #00a86b;
    --text: #e8eaf0;
    --muted: #888ca0;
    --error: #ff4d6d;
    --warn: #ffaa00;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Hiragino Sans', 'Noto Sans JP', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 16px;
  }
  .header {
    text-align: center;
    margin-bottom: 32px;
  }
  .header h1 {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--accent);
    letter-spacing: 0.05em;
  }
  .header p {
    font-size: 0.85rem;
    color: var(--muted);
    margin-top: 6px;
  }
  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 28px;
    width: 100%;
    max-width: 600px;
    margin-bottom: 20px;
  }
  .card h2 {
    font-size: 1rem;
    font-weight: 600;
    margin-bottom: 20px;
    color: var(--accent);
    display: flex;
    align-items: center;
    gap: 8px;
  }
  label {
    display: block;
    font-size: 0.82rem;
    color: var(--muted);
    margin-bottom: 6px;
    margin-top: 16px;
  }
  label:first-of-type { margin-top: 0; }
  input, select, textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    color: var(--text);
    font-size: 0.95rem;
    padding: 12px 14px;
    outline: none;
    transition: border-color 0.2s;
    font-family: inherit;
  }
  input:focus, select:focus, textarea:focus {
    border-color: var(--accent);
  }
  textarea { resize: vertical; min-height: 110px; }
  .stars { display: flex; gap: 8px; margin-top: 4px; }
  .star {
    font-size: 2rem;
    cursor: pointer;
    color: var(--border);
    transition: color 0.15s;
    user-select: none;
  }
  .star.active { color: #ffd700; }
  .btn {
    width: 100%;
    padding: 14px;
    border-radius: 12px;
    border: none;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 20px;
    font-family: inherit;
  }
  .btn-primary {
    background: var(--accent);
    color: #000;
  }
  .btn-primary:hover { background: var(--accent2); }
  .btn-primary:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn-copy {
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    margin-top: 12px;
  }
  .btn-copy:hover { background: var(--accent); color: #000; }
  .result-box {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    font-size: 0.93rem;
    line-height: 1.75;
    white-space: pre-wrap;
    margin-top: 16px;
    min-height: 80px;
  }
  .msg {
    font-size: 0.85rem;
    padding: 10px 14px;
    border-radius: 8px;
    margin-top: 12px;
  }
  .msg-error { background: #2a0a12; color: var(--error); border: 1px solid var(--error)33; }
  .msg-success { background: #0a2a1a; color: var(--accent); border: 1px solid var(--accent)33; }
  .license-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 60vh;
    width: 100%;
    max-width: 440px;
    text-align: center;
  }
  .license-screen .icon { font-size: 3rem; margin-bottom: 16px; }
  .license-screen h2 { font-size: 1.2rem; margin-bottom: 8px; }
  .license-screen p { font-size: 0.85rem; color: var(--muted); margin-bottom: 24px; }
  #licenseInput {
    text-align: center;
    letter-spacing: 0.1em;
    font-size: 1.1rem;
    text-transform: uppercase;
  }
  .spinner {
    display: inline-block;
    width: 18px; height: 18px;
    border: 2px solid #fff4;
    border-top-color: #000;
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    vertical-align: middle;
    margin-right: 6px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #mainApp { display: none; width: 100%; max-width: 600px; }
</style>
</head>
<body>

<div class="header">
  <h1>⭐ MEO レビュー返信ツール</h1>
  <p>Googleマップの口コミに、AIが最適な返信文を自動生成</p>
</div>

<!-- ライセンス認証画面 -->
<div class="license-screen" id="licenseScreen">
  <div class="icon">🔑</div>
  <h2>ライセンスキーを入力</h2>
  <p>ご購入時にお送りしたライセンスキーを入力してください<br>（例：MEO-XXXX-XXXX-XXXX）</p>
  <input type="text" id="licenseInput" placeholder="MEO-XXXX-XXXX-XXXX" maxlength="20" />
  <div id="licenseMsg"></div>
  <button class="btn btn-primary" id="licenseBtn" onclick="verifyLicense()" style="max-width:300px; margin-top:16px;">
    認証する
  </button>
</div>

<!-- メインアプリ -->
<div id="mainApp">
  <div class="card">
    <h2>📝 レビュー情報を入力</h2>

    <label>店舗名 *</label>
    <input type="text" id="storeName" placeholder="例：〇〇ラーメン 渋谷店" />

    <label>業種 *</label>
    <select id="industry">
      <option value="">選択してください</option>
      <option value="ラーメン・麺類">ラーメン・麺類</option>
      <option value="居酒屋・バー">居酒屋・バー</option>
      <option value="カフェ・喫茶店">カフェ・喫茶店</option>
      <option value="イタリアン・フレンチ">イタリアン・フレンチ</option>
      <option value="焼肉・ステーキ">焼肉・ステーキ</option>
      <option value="寿司・和食">寿司・和食</option>
      <option value="美容室・理容室">美容室・理容室</option>
      <option value="整体・マッサージ">整体・マッサージ</option>
      <option value="歯科・クリニック">歯科・クリニック</option>
      <option value="ネイルサロン">ネイルサロン</option>
      <option value="小売・雑貨">小売・雑貨</option>
      <option value="その他">その他</option>
    </select>

    <label>レビューの星評価 *</label>
    <div class="stars" id="stars">
      <span class="star" data-v="1" onclick="setStar(1)">★</span>
      <span class="star" data-v="2" onclick="setStar(2)">★</span>
      <span class="star" data-v="3" onclick="setStar(3)">★</span>
      <span class="star" data-v="4" onclick="setStar(4)">★</span>
      <span class="star" data-v="5" onclick="setStar(5)">★</span>
    </div>

    <label>レビュー本文 *</label>
    <textarea id="reviewText" placeholder="Googleマップに投稿されたレビューをそのままコピペしてください"></textarea>

    <button class="btn btn-primary" id="generateBtn" onclick="generateReply()" disabled>
      ✨ 返信文を生成する
    </button>
  </div>

  <div class="card" id="resultCard" style="display:none;">
    <h2>💬 生成された返信文</h2>
    <div class="result-box" id="resultText"></div>
    <button class="btn btn-copy" onclick="copyText()">📋 コピーする</button>
    <div id="copyMsg"></div>
  </div>
</div>

<script>
let rating = 0;
let licenseKey = '';

// ライセンス認証
async function verifyLicense() {
  const key = document.getElementById('licenseInput').value.trim().toUpperCase();
  const btn = document.getElementById('licenseBtn');
  const msg = document.getElementById('licenseMsg');

  if (!key) {
    msg.innerHTML = '<div class="msg msg-error">キーを入力してください</div>';
    return;
  }

  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>認証中...';
  msg.innerHTML = '';

  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'verify', licenseKey: key })
    });
    const data = await res.json();

    if (data.valid) {
      licenseKey = key;
      localStorage.setItem('meo_license', key);
      document.getElementById('licenseScreen').style.display = 'none';
      document.getElementById('mainApp').style.display = 'flex';
      document.getElementById('mainApp').style.flexDirection = 'column';
      document.getElementById('mainApp').style.alignItems = 'center';
      checkForm();
    } else {
      msg.innerHTML = '<div class="msg msg-error">ライセンスキーが無効です。ご購入時のキーをご確認ください。</div>';
      btn.disabled = false;
      btn.innerHTML = '認証する';
    }
  } catch (e) {
    msg.innerHTML = '<div class="msg msg-error">通信エラーが発生しました。再度お試しください。</div>';
    btn.disabled = false;
    btn.innerHTML = '認証する';
  }
}

// 保存済みキーで自動ログイン
window.addEventListener('load', () => {
  const saved = localStorage.getItem('meo_license');
  if (saved) {
    document.getElementById('licenseInput').value = saved;
    verifyLicense();
  }
});

// 星評価
function setStar(v) {
  rating = v;
  document.querySelectorAll('.star').forEach(s => {
    s.classList.toggle('active', parseInt(s.dataset.v) <= v);
  });
  checkForm();
}

// フォームバリデーション
function checkForm() {
  const ok = document.getElementById('storeName').value.trim() &&
             document.getElementById('industry').value &&
             rating > 0 &&
             document.getElementById('reviewText').value.trim();
  document.getElementById('generateBtn').disabled = !ok;
}
['storeName','industry','reviewText'].forEach(id => {
  document.getElementById(id)?.addEventListener('input', checkForm);
});

// 返信文生成
async function generateReply() {
  const btn = document.getElementById('generateBtn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>生成中...';

  document.getElementById('resultCard').style.display = 'none';

  try {
    const res = await fetch('/api/generate', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        action: 'generate',
        licenseKey,
        storeName: document.getElementById('storeName').value.trim(),
        industry: document.getElementById('industry').value,
        rating,
        reviewText: document.getElementById('reviewText').value.trim()
      })
    });
    const data = await res.json();

    if (data.reply) {
      document.getElementById('resultText').textContent = data.reply;
      document.getElementById('resultCard').style.display = 'block';
    } else {
      alert('エラー: ' + (data.error || '生成に失敗しました'));
    }
  } catch (e) {
    alert('通信エラーが発生しました。再度お試しください。');
  }

  btn.disabled = false;
  btn.innerHTML = '✨ 返信文を生成する';
  checkForm();
}

// コピー
function copyText() {
  const text = document.getElementById('resultText').textContent;
  navigator.clipboard.writeText(text).then(() => {
    document.getElementById('copyMsg').innerHTML = '<div class="msg msg-success">✅ コピーしました！</div>';
    setTimeout(() => document.getElementById('copyMsg').innerHTML = '', 2000);
  });
}
</script>
</body>
</html>
